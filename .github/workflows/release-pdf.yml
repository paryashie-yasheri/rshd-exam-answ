name: Release PDF

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc & LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-latex-extra fonts-dejavu-core

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli puppeteer

      - name: Configure Puppeteer
        run: |
          echo '{ "args": ["--no-sandbox", "--disable-setuid-sandbox"] }' > puppeteer-config.json

      - name: Pre-render mermaid diagrams
        run: python3 .github/scripts/render-mermaid.py

      - name: Build PDF
        run: |
          pandoc README-processed.md -o BLPS-answers.pdf \
            --pdf-engine=xelatex \
            -H .github/scripts/pdf-header.tex \
            -V mainfont='DejaVu Sans' \
            -V monofont='DejaVu Sans Mono' \
            -V fontsize=12pt \
            -V geometry:margin=1in

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: РСХД v${{ github.run_number }}
          files: RSHD.pdf
          generate_release_notes: true
